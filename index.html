

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFTY — Card Game</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0d12;--surface:#16161f;--surface2:#1e1e2a;--border:#2a2a3a;
    --gold:#f0c060;--gold2:#c89030;--red:#e05050;--green:#50c878;
    --blue:#5090e0;--purple:#9060d0;--orange:#e08830;
    --text:#e8e8f0;--muted:#888899;--card-w:72px;--card-h:100px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Space Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(240,192,96,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(240,192,96,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  #app{position:relative;z-index:1;}
  .screen{display:none;min-height:100vh;}
  .screen.active{display:flex;flex-direction:column;}
 
  /* TITLE */
  #title-screen{align-items:center;justify-content:center;gap:28px;text-align:center;padding:40px 20px;}
  .title-logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(80px,15vw,140px);line-height:.9;letter-spacing:4px;background:linear-gradient(135deg,var(--gold) 0%,#fff8e0 50%,var(--gold2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 40px rgba(240,192,96,.4));}
  .title-sub{font-family:'Syne',sans-serif;font-size:13px;letter-spacing:6px;text-transform:uppercase;color:var(--muted);}
  .player-setup{display:flex;flex-direction:column;gap:16px;align-items:center;width:100%;max-width:400px;}
  .setup-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
  .player-count-btns{display:flex;gap:10px;}
  .cnt-btn{width:52px;height:52px;border-radius:8px;background:var(--surface2);border:2px solid var(--border);color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:28px;cursor:pointer;transition:all .2s;}
  .cnt-btn:hover,.cnt-btn.selected{border-color:var(--gold);color:var(--gold);background:rgba(240,192,96,.1);box-shadow:0 0 20px rgba(240,192,96,.2);}
  .btn-primary{padding:14px 48px;border-radius:8px;background:linear-gradient(135deg,var(--gold2),var(--gold));border:none;color:#0d0d12;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;cursor:pointer;transition:all .2s;box-shadow:0 4px 24px rgba(240,192,96,.3);}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(240,192,96,.5);}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;}
  .setup-names{display:flex;flex-direction:column;gap:8px;width:100%;}
  .name-input-row{display:flex;align-items:center;gap:8px;}
  .name-avatar{font-size:18px;width:28px;text-align:center;}
  .name-input{flex:1;padding:8px 12px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Space Mono',monospace;font-size:12px;outline:none;transition:border-color .2s;}
  .name-input:focus{border-color:var(--gold2);}
 
  /* GAME */
  #game-screen{padding:10px;gap:8px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;flex-shrink:0;}
  .topbar-title{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);letter-spacing:2px;}
  .turn-badge{padding:4px 14px;border-radius:20px;background:rgba(240,192,96,.15);border:1px solid var(--gold2);font-size:11px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;}
  .btn-sm{padding:6px 14px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s;}
  .btn-sm:hover{border-color:var(--gold);color:var(--gold);}
  .players-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:8px;flex:1;}
  .player-panel{background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:12px;position:relative;transition:border-color .3s,box-shadow .3s;}
  .player-panel.active-turn{border-color:var(--gold);box-shadow:0 0 24px rgba(240,192,96,.2),inset 0 0 40px rgba(240,192,96,.04);}
  @keyframes winPulse{from{box-shadow:0 0 20px rgba(80,200,120,.3);}to{box-shadow:0 0 60px rgba(80,200,120,.6);}}
  .player-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
  .player-name-row{display:flex;align-items:center;gap:8px;}
  .player-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .player-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;}
  .ai-badge{font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:2px 6px;border-radius:4px;background:rgba(144,96,208,.2);border:1px solid rgba(144,96,208,.4);color:var(--purple);}
  .streak-badge{font-size:9px;padding:2px 7px;border-radius:4px;background:rgba(224,80,80,.15);border:1px solid rgba(224,80,80,.4);color:var(--red);letter-spacing:1px;}
  .total-display{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;text-align:right;}
  .total-display .total-num{color:var(--gold);}
  .total-display .total-slash,.total-display .total-goal{color:var(--muted);font-size:18px;}
  .total-display.perfect .total-num{color:var(--green);filter:drop-shadow(0 0 8px var(--green));}
  .total-display.over .total-num{color:var(--red);}
  .penalty-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
  .penalty-tag{font-size:9px;padding:2px 8px;border-radius:12px;background:rgba(224,136,48,.15);border:1px solid rgba(224,136,48,.4);color:var(--orange);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
 
  /* CARDS */
  .hand-area{margin-bottom:8px;}
  .hand-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .cards-row{display:flex;gap:6px;flex-wrap:wrap;}
  .card{width:var(--card-w);height:var(--card-h);border-radius:10px;border:2px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:default;position:relative;transition:transform .15s,border-color .15s,box-shadow .15s;user-select:none;flex-shrink:0;}
  .card.number-card{background:linear-gradient(145deg,#1a1a28,#111118);}
  .card.special-card{background:linear-gradient(145deg,#1e1428,#130e1a);}
  .card.selectable{cursor:pointer;border-color:rgba(240,192,96,.3);}
  .card.selectable:hover{transform:translateY(-6px);border-color:var(--gold);box-shadow:0 8px 24px rgba(240,192,96,.3);z-index:10;}
  .card.selected{border-color:var(--green);box-shadow:0 0 20px rgba(80,200,120,.4);transform:translateY(-8px);}
  .card .card-value{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1;color:var(--text);}
  .card.number-card .card-value{color:#e8e8f0;}
  .card.special-card .card-value{color:var(--purple);font-size:22px;}
  .card .card-type-dot{position:absolute;bottom:6px;width:6px;height:6px;border-radius:50%;}
  .number-card .card-type-dot{background:var(--blue);}
  .special-card .card-type-dot{background:var(--purple);}
  .card .card-corner{position:absolute;top:4px;left:6px;font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;}
 
  /* ACTION */
  .action-panel{background:var(--surface);border:2px solid var(--gold2);border-radius:14px;padding:14px;box-shadow:0 0 30px rgba(240,192,96,.1);flex-shrink:0;}
  .action-title{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold);letter-spacing:2px;margin-bottom:10px;}
  .step-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .draw-btn{padding:8px 18px;border-radius:8px;border:2px solid;font-family:'Space Mono',monospace;font-size:12px;cursor:pointer;transition:all .2s;}
  .draw-btn.num{border-color:var(--blue);color:var(--blue);background:rgba(80,144,224,.08);}
  .draw-btn.num:hover:not(:disabled){background:rgba(80,144,224,.2);box-shadow:0 0 16px rgba(80,144,224,.3);}
  .draw-btn.spec{border-color:var(--purple);color:var(--purple);background:rgba(144,96,208,.08);}
  .draw-btn.spec:hover:not(:disabled){background:rgba(144,96,208,.2);box-shadow:0 0 16px rgba(144,96,208,.3);}
  .draw-btn:disabled{opacity:.4;cursor:not-allowed;}
  .drawn-card-preview{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);font-size:13px;}
  .btn-action{padding:8px 20px;border-radius:8px;background:rgba(80,200,120,.15);border:2px solid var(--green);color:var(--green);font-family:'Space Mono',monospace;font-size:12px;cursor:pointer;transition:all .2s;}
  .btn-action:hover:not(:disabled){background:rgba(80,200,120,.3);}
  .btn-action:disabled{opacity:.4;cursor:not-allowed;}
  .btn-danger{padding:8px 20px;border-radius:8px;background:rgba(224,80,80,.1);border:2px solid var(--red);color:var(--red);font-family:'Space Mono',monospace;font-size:12px;cursor:pointer;transition:all .2s;}
  .btn-danger:hover{background:rgba(224,80,80,.25);}
 
  /* PILES */
  .piles-row{display:flex;gap:12px;align-items:center;padding:10px 14px;background:var(--surface2);border-radius:10px;border:1px solid var(--border);}
  .pile-info{display:flex;flex-direction:column;align-items:center;gap:2px;}
  .pile-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
  .pile-count{font-family:'Bebas Neue',sans-serif;font-size:20px;}
  .pile-count.num{color:var(--blue);}.pile-count.spec{color:var(--purple);}
  .pile-div{width:1px;height:30px;background:var(--border);}
 
  /* LOG */
  .log-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;max-height:100px;overflow-y:auto;flex-shrink:0;}
  .log-panel::-webkit-scrollbar{width:4px;}
  .log-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  .log-entry{font-size:11px;color:var(--muted);padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03);}
  .log-entry:last-child{border-bottom:none;}
  .le-player{color:var(--text);font-weight:700;}.le-action{color:var(--gold);}.le-card{color:var(--purple);}.le-win{color:var(--green);font-weight:700;}.le-penalty{color:var(--orange);font-weight:700;}
 
  /* PENALTY SCREEN */
  #penalty-screen{align-items:center;justify-content:center;gap:18px;text-align:center;padding:30px 20px;background:radial-gradient(ellipse at center,rgba(224,136,48,.06) 0%,transparent 70%);}
  .penalty-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(50px,10vw,90px);color:var(--orange);filter:drop-shadow(0 0 20px rgba(224,136,48,.5));letter-spacing:3px;}
  .penalty-loser{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text);}
  .penalty-diff{font-size:13px;color:var(--muted);}
  .streak-info{padding:10px 20px;border-radius:10px;background:rgba(224,80,80,.1);border:1px solid rgba(224,80,80,.3);font-size:13px;color:var(--red);}
  .penalty-instructions{font-size:13px;color:var(--muted);max-width:400px;line-height:1.8;}
  .penalty-cards-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:640px;}
  .penalty-draw-card{width:80px;height:110px;border-radius:10px;background:repeating-linear-gradient(45deg,#281a10 0px,#281a10 8px,#1e1008 8px,#1e1008 16px);border:2px solid var(--orange);cursor:pointer;transition:transform .2s,box-shadow .2s;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
  .penalty-draw-card:hover:not(.revealed){transform:translateY(-8px) rotate(-2deg);box-shadow:0 12px 30px rgba(224,136,48,.4);}
  .penalty-draw-card.revealed{cursor:default;background:linear-gradient(145deg,#281a10,#1a0e08);}
  .penalty-draw-card.disabled{opacity:.3;cursor:default;}
  .penalty-card-inner{display:flex;flex-direction:column;align-items:center;padding:6px;}
 
  /* WIN */
  #win-screen{align-items:center;justify-content:center;gap:18px;text-align:center;padding:40px 20px;}
  .win-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(60px,12vw,100px);background:linear-gradient(135deg,var(--green),#a0ffb0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 30px rgba(80,200,120,.5));}
  .win-player{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--gold);}
  .win-cards{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
  .confetti-dot{position:fixed;pointer-events:none;border-radius:2px;animation:fall linear forwards;}
  @keyframes fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
 
  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:2px solid var(--gold2);border-radius:16px;padding:24px;max-width:440px;width:90%;box-shadow:0 20px 80px rgba(0,0,0,.6);max-height:80vh;overflow-y:auto;}
  .modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);margin-bottom:12px;}
  .modal-body{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6;}
  .modal-cards{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .modal-btns{display:flex;gap:8px;flex-wrap:wrap;}
 
  /* THINKING */
  .thinking-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:rgba(144,96,208,.08);border:1px solid rgba(144,96,208,.2);border-radius:8px;font-size:12px;color:var(--purple);}
  .thinking-dots span{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--purple);margin:0 2px;animation:dot-bounce .8s ease-in-out infinite;}
  .thinking-dots span:nth-child(2){animation-delay:.2s;}
  .thinking-dots span:nth-child(3){animation-delay:.4s;}
  @keyframes dot-bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
  @media(max-width:600px){:root{--card-w:58px;--card-h:82px;}.card .card-value{font-size:26px;}.penalty-draw-card{width:68px;height:95px;font-size:22px;}}
</style>
</head>
<body>
<div id="app">
 
<!-- TITLE -->
<div id="title-screen" class="screen active">
  <div class="title-logo">FIFTY</div>
  <div class="title-sub">The Strategic Card Game</div>
  <div class="player-setup">
    <div class="setup-label">Number of Players</div>
    <div class="player-count-btns">
      <button class="cnt-btn" data-count="2">2</button>
      <button class="cnt-btn" data-count="3">3</button>
      <button class="cnt-btn" data-count="4">4</button>
    </div>
    <div class="setup-names" id="setup-names"></div>
    <button class="btn-primary" id="start-btn" disabled>DEAL CARDS</button>
  </div>
  <div style="font-size:11px;color:var(--muted);max-width:300px;line-height:1.9;text-align:center">
    First to sum exactly <span style="color:var(--green)">50</span> wins!<br>
    Loser draws <span style="color:var(--orange)">🎭 PENALTY</span> cards from a secret pile.<br>
    Loss streaks = more penalty cards!
  </div>
</div>
 
<!-- GAME -->
<div id="game-screen" class="screen">
  <div class="topbar">
    <div class="topbar-title">FIFTY</div>
    <div class="turn-badge" id="turn-badge">—</div>
    <div style="display:flex;gap:6px;align-items:center">
      <div class="piles-row" style="padding:4px 10px">
        <div class="pile-info"><div class="pile-label">NUM</div><div class="pile-count num" id="num-pile-count">—</div></div>
        <div class="pile-div"></div>
        <div class="pile-info"><div class="pile-label">SPEC</div><div class="pile-count spec" id="spec-pile-count">—</div></div>
      </div>
      <button class="btn-sm" onclick="showRules()">RULES</button>
    </div>
  </div>
  <div class="players-grid" id="players-grid"></div>
  <div id="thinking-bar" class="thinking-bar" style="display:none">
    <span>AI is thinking</span>
    <div class="thinking-dots"><span></span><span></span><span></span></div>
  </div>
  <div id="action-panel" class="action-panel" style="display:none"></div>
  <div class="log-panel" id="log-panel">
    <div class="log-entry"><span style="color:var(--gold)">Game started. Good luck!</span></div>
  </div>
</div>
 
<!-- PENALTY SCREEN -->
<div id="penalty-screen" class="screen">
  <div class="penalty-title">🎭 PENALTY!</div>
  <div class="penalty-loser" id="penalty-loser-name"></div>
  <div class="penalty-diff" id="penalty-diff-text"></div>
  <div class="streak-info" id="penalty-streak-info" style="display:none"></div>
  <div class="penalty-instructions" id="penalty-instructions"></div>
  <div class="penalty-cards-grid" id="penalty-cards-grid"></div>
  <button class="btn-primary" id="penalty-continue-btn" style="display:none" onclick="afterPenalty()">CONTINUE ▶</button>
</div>
 
<!-- WIN -->
<div id="win-screen" class="screen">
  <div class="win-title">WINNER!</div>
  <div class="win-player" id="win-player-name"></div>
  <div style="font-size:13px;color:var(--muted)">reached exactly <span style="color:var(--green);font-weight:700">50</span></div>
  <div class="win-cards" id="win-cards"></div>
  <div id="win-penalties-section" style="margin-top:10px;width:100%;max-width:500px"></div>
  <button class="btn-primary" onclick="resetGame()">PLAY AGAIN</button>
</div>
 
</div>
 
<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-cards" id="modal-cards"></div>
    <div class="modal-btns" id="modal-btns"></div>
  </div>
</div>
 
<script>
// ── PENALTY CARDS (20) ──────────────────────────────
const PENALTY_CARDS = [
  {icon:'🎤',text:'Sing a song for 10 seconds!'},
  {icon:'👶',text:'Talk like a baby next round'},
  {icon:'🤡',text:'Talk like a clown next round'},
  {icon:'🫏',text:'Bray like a donkey right now!'},
  {icon:'🕺',text:'Do a 10-second victory dance'},
  {icon:'🐱',text:'Meow every time you speak this round'},
  {icon:'🤖',text:'Talk like a robot next round'},
  {icon:'🦁',text:'Roar like a lion 3 times — now!'},
  {icon:'🐧',text:'Waddle around for 30 seconds'},
  {icon:'🎭',text:'Perform a dramatic 5-sec monologue'},
  {icon:'🫣',text:'Eyes closed on your entire next turn'},
  {icon:'🧊',text:'Say "brrrr" before every sentence next round'},
  {icon:'🦸',text:'Announce moves in a superhero voice this round'},
  {icon:'😤',text:'Only whisper for the next round'},
  {icon:'🎬',text:'Narrate everything in 3rd person this round'},
  {icon:'🤫',text:'Cannot say "I" or "me" next round'},
  {icon:'🍕',text:'Describe your strategy like a pizza order'},
  {icon:'🌊',text:'Only speak in questions your next turn'},
  {icon:'🧙',text:'Talk like a wise wizard all next round'},
  {icon:'👑',text:'Call every player "Your Majesty" next round'},
];
 
// ── GAME DATA ───────────────────────────────────────
const SPECIAL_CARDS = [
  // +1 x4, +2 x4, +3 x4, +5 x4  (16 plus cards)
  {id:'p1a',label:'+1',value:1,type:'add'},{id:'p1b',label:'+1',value:1,type:'add'},{id:'p1c',label:'+1',value:1,type:'add'},{id:'p1d',label:'+1',value:1,type:'add'},
  {id:'p2a',label:'+2',value:2,type:'add'},{id:'p2b',label:'+2',value:2,type:'add'},{id:'p2c',label:'+2',value:2,type:'add'},{id:'p2d',label:'+2',value:2,type:'add'},
  {id:'p3a',label:'+3',value:3,type:'add'},{id:'p3b',label:'+3',value:3,type:'add'},{id:'p3c',label:'+3',value:3,type:'add'},{id:'p3d',label:'+3',value:3,type:'add'},
  {id:'p5a',label:'+5',value:5,type:'add'},{id:'p5b',label:'+5',value:5,type:'add'},{id:'p5c',label:'+5',value:5,type:'add'},{id:'p5d',label:'+5',value:5,type:'add'},
  // −1 x1, −2 x1, −3 x1, −4 x1, −5 x1  (5 minus cards)
  {id:'m1',label:'−1',value:-1,type:'sub'},
  {id:'m2',label:'−2',value:-2,type:'sub'},
  {id:'m3',label:'−3',value:-3,type:'sub'},
  {id:'m4',label:'−4',value:-4,type:'sub'},
  {id:'m5',label:'−5',value:-5,type:'sub'},
  // SWAP x2
  {id:'sw1',label:'SWAP',value:0,type:'swap'},{id:'sw2',label:'SWAP',value:0,type:'swap'},
];
const AVATARS=['🟡','🔴','🔵','🟣'];
const DEFAULT_NAMES=['You','Aiden','Byte','Nova'];
 
let G={}, playerNames=[], selectedCount=null;
 
// ── SETUP ───────────────────────────────────────────
function setPlayerCount(n){
  selectedCount=n;
  document.querySelectorAll('.cnt-btn').forEach(b=>b.classList.toggle('selected',parseInt(b.dataset.count)===n));
  document.getElementById('start-btn').disabled=false;
  const c=document.getElementById('setup-names'); c.innerHTML='';
  for(let i=0;i<n;i++){
    const r=document.createElement('div'); r.className='name-input-row';
    r.innerHTML=`<span class="name-avatar">${AVATARS[i]}</span><input class="name-input" id="name-${i}" placeholder="${DEFAULT_NAMES[i]}" maxlength="14" value="${DEFAULT_NAMES[i]}">${i>0?'<span class="ai-badge" style="white-space:nowrap">AI</span>':''}`;
    c.appendChild(r);
  }
}
document.querySelectorAll('.cnt-btn').forEach(b=>b.addEventListener('click',()=>setPlayerCount(parseInt(b.dataset.count))));
document.getElementById('start-btn').addEventListener('click',()=>{
  if(!selectedCount)return;
  playerNames=[];
  for(let i=0;i<selectedCount;i++){const inp=document.getElementById('name-'+i);playerNames.push(inp?.value.trim()||DEFAULT_NAMES[i]);}
  setScreen('game-screen');
  document.getElementById('log-panel').innerHTML='<div class="log-entry"><span style="color:var(--gold)">Game started. Good luck!</span></div>';
  initGame(selectedCount);
});
 
// ── DECKS ───────────────────────────────────────────
function buildNumDeck(){let d=[];for(let i=0;i<4;i++)for(let n=1;n<=10;n++)d.push({kind:'number',value:n,label:String(n)});return d;}
function buildSpecDeck(){return SPECIAL_CARDS.map(s=>({kind:'special',...s}));}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function drawFrom(pile,disc){if(!pile.length){if(!disc.length)return null;pile.push(...shuffle([...disc]));disc.length=0;}return pile.pop();}
function hSum(p){return p.hand.reduce((s,c)=>s+c.value,0)+(p.bonus||0);}
 
// ── INIT ────────────────────────────────────────────
function initGame(n){
  const nd=shuffle(buildNumDeck()),sd=shuffle(buildSpecDeck()),players=[];
  for(let i=0;i<n;i++){const hand=[];for(let j=0;j<5;j++)hand.push(nd.pop());players.push({id:i,name:playerNames[i]||DEFAULT_NAMES[i],avatar:AVATARS[i],isHuman:i===0,hand,specials:[],bonus:0,lossStreak:0,activePenalties:[]});}
  G={players,nd,sd,ndDisc:[],sdDisc:[],cur:0,phase:'draw',drawn:null,drawnFrom:null,selHand:null,selSpec:null,swapTarget:null,swapTargetCard:null,over:false,winner:null,replLeft:0};
  renderAll();updatePanel();
}
 
// ── RENDER ──────────────────────────────────────────
function mkCard(card,opts={}){
  const el=document.createElement('div');
  el.className='card '+(card.kind==='number'?'number-card':'special-card');
  if(opts.selectable)el.classList.add('selectable');
  if(opts.selected)el.classList.add('selected');
  const corner=document.createElement('div');corner.className='card-corner';corner.textContent=card.kind==='number'?'#':'✦';el.appendChild(corner);
  const val=document.createElement('div');val.className='card-value';val.textContent=card.label;el.appendChild(val);
  const dot=document.createElement('div');dot.className='card-type-dot';el.appendChild(dot);
  if(opts.onclick)el.addEventListener('click',opts.onclick);
  return el;
}
 
function renderAll(){
  const grid=document.getElementById('players-grid');grid.innerHTML='';
  G.players.forEach(p=>{
    const panel=document.createElement('div');panel.className='player-panel';panel.id='pp'+p.id;
    if(p.id===G.cur&&!G.over)panel.classList.add('active-turn');
    const s=hSum(p),isp=s===50,iso=s>50;
    // header
    const hdr=document.createElement('div');hdr.className='player-header';
    const nr=document.createElement('div');nr.className='player-name-row';
    nr.innerHTML=`<div class="player-avatar">${p.avatar}</div><div><div class="player-name">${p.name}</div><div style="display:flex;gap:4px;margin-top:2px;flex-wrap:wrap">${!p.isHuman?'<span class="ai-badge">AI</span>':''}${p.lossStreak>0?`<span class="streak-badge">🔥×${p.lossStreak}</span>`:''}${p.bonus!==0?`<span style="font-size:9px;color:${p.bonus>0?'var(--green)':'var(--red)'}">+${p.bonus}</span>`:''}</div></div>`;
    const td=document.createElement('div');td.className='total-display'+(isp?' perfect':iso?' over':'');
    td.innerHTML=`<span class="total-num">${s}</span><span class="total-slash">/</span><span class="total-goal">50</span>`;
    hdr.appendChild(nr);hdr.appendChild(td);panel.appendChild(hdr);
    // penalties
    if(p.activePenalties.length){const pt=document.createElement('div');pt.className='penalty-tags';p.activePenalties.forEach(pen=>{const t=document.createElement('div');t.className='penalty-tag';t.textContent=pen.icon+' '+pen.text;pt.appendChild(t);});panel.appendChild(pt);}
    // number hand
    const ha=document.createElement('div');ha.className='hand-area';ha.innerHTML='<div class="hand-label">Number Hand</div>';
    const cr=document.createElement('div');cr.className='cards-row';
    const my=p.id===G.cur&&p.isHuman&&!G.over;
    p.hand.forEach((card,i)=>{
      const isRepN=G.phase==='replace'&&G.drawnFrom==='number';
      const isSwap=G.phase==='swap_pick_my_card';
      const isRepS=G.phase==='replace_special';
      const isSwapT=G.phase==='swap_pick_target_card'&&p.id===G.swapTarget;
      const sel=(my&&(isRepN||isSwap||isRepS))||isSwapT;
      const chosen=(my&&G.selHand===i&&(isRepN||isSwap||isRepS))||(isSwapT&&G.swapTargetCard===i);
      const ce=mkCard(card,{selectable:sel,selected:chosen,onclick:sel?()=>cardClick(p.id,i,'hand'):null});
      if(!p.isHuman)ce.classList.remove('selectable');
      cr.appendChild(ce);
    });
    ha.appendChild(cr);panel.appendChild(ha);
    // specials
    if(p.specials.length){const sa=document.createElement('div');sa.className='hand-area';sa.innerHTML='<div class="hand-label">Special Cards</div>';const sr=document.createElement('div');sr.className='cards-row';
    p.specials.forEach((card,i)=>{const isRepSp=G.phase==='replace'&&G.drawnFrom==='special';const isPl=G.phase==='play_special';const sel=my&&(isRepSp||isPl);const chosen=G.selSpec===i&&sel;const ce=mkCard(card,{selectable:sel,selected:chosen,onclick:sel?()=>cardClick(p.id,i,'special'):null});if(!p.isHuman)ce.classList.remove('selectable');sr.appendChild(ce);});sa.appendChild(sr);panel.appendChild(sa);}
    grid.appendChild(panel);
  });
  document.getElementById('num-pile-count').textContent=G.nd.length+G.ndDisc.length;
  document.getElementById('spec-pile-count').textContent=G.sd.length+G.sdDisc.length;
  const cp=G.players[G.cur];
  document.getElementById('turn-badge').textContent=cp.isHuman?'YOUR TURN':cp.name.toUpperCase()+"'S TURN";
}
 
// ── ACTION PANEL ────────────────────────────────────
function updatePanel(){
  const panel=document.getElementById('action-panel');
  const cp=G.players[G.cur];
  if(!cp.isHuman||G.over){panel.style.display='none';return;}
  panel.style.display='block';panel.innerHTML='';
  const T=(t)=>{const d=document.createElement('div');d.className='action-title';d.textContent=t;panel.appendChild(d);};
  const H=(t)=>{const d=document.createElement('div');d.style.cssText='font-size:12px;color:var(--muted);margin-top:4px;margin-bottom:6px';d.textContent=t;panel.appendChild(d);};
  const R=()=>{const r=document.createElement('div');r.className='step-row';r.style.marginTop='8px';panel.appendChild(r);return r;};
  const btn=(cls,txt,fn)=>{const b=document.createElement('button');b.className=cls;b.textContent=txt;b.onclick=fn;return b;};
 
  if(G.phase==='draw'){
    T('STEP 1 — DRAW A CARD');
    const r=R();
    r.appendChild(btn('draw-btn num','Draw Number',()=>humanDraw('number')));
    r.appendChild(btn('draw-btn spec','Draw Special',()=>humanDraw('special')));
  } else if(G.phase==='replace'){
    T(G.drawnFrom==='number'?'STEP 2 — REPLACE A NUMBER CARD':'STEP 2 — MANAGE SPECIAL CARD');
    const pv=document.createElement('div');pv.className='drawn-card-preview';pv.innerHTML=`Drew: <strong style="color:${G.drawnFrom==='number'?'var(--blue)':'var(--purple)'}">${G.drawn.label}</strong>`;panel.appendChild(pv);
    if(G.drawnFrom==='number'){
      H('Click a number card in your hand to replace it.');
      if(G.selHand!==null){const r=R();r.appendChild(btn('btn-action','Confirm Replace',confirmRepNum));r.appendChild(btn('btn-danger','Discard Drawn',discardDrawn));}
    } else {
      if(cp.specials.length<2){const r=R();r.appendChild(btn('btn-action','Add to Hand',addSpecial));r.appendChild(btn('btn-danger','Discard',discardDrawn));}
      else{H('Hand full. Click a special to replace, or discard.');if(G.selSpec!==null){const r=R();r.appendChild(btn('btn-action','Replace Selected',confirmRepSpec));r.appendChild(btn('btn-danger','Discard Drawn',discardDrawn));}}
    }
  } else if(G.phase==='play_special'){
    T('STEP 3 — PLAY A SPECIAL? (Optional)');H('Click a special card to play it, or skip.');
    const r=R();
    if(G.selSpec!==null)r.appendChild(btn('btn-action','Play Selected',playSpec));
    r.appendChild(btn('btn-danger','Skip / End Turn',endTurn));
  } else if(G.phase==='swap_pick_my_card'){T('SWAP — PICK YOUR CARD');H('Click one of your number cards to swap.');}
  else if(G.phase==='swap_pick_target_card'){T('SWAP — PICK OPPONENT CARD');H('Click a card from the target player.');const r=R();r.appendChild(btn('btn-danger','Cancel Swap',cancelSwap));}
  else if(G.phase==='replace_special'){T('REPLACE ALL — PICK CARD TO REMOVE');H(`Click a card to replace it (${G.replLeft} remaining).`);const r=R();if(G.selHand!==null)r.appendChild(btn('btn-action','Confirm Replace',confirmRepAllStep));r.appendChild(btn('btn-danger','Done',()=>{G.phase='done';endTurn();}));}
}
 
// ── HUMAN ACTIONS ───────────────────────────────────
function humanDraw(from){
  const card=from==='number'?drawFrom(G.nd,G.ndDisc):drawFrom(G.sd,G.sdDisc);
  if(!card){log('No cards left!','System');return;}
  G.drawn=card;G.drawnFrom=from;G.phase='replace';
  log(`drew a ${from} card`,G.players[G.cur].name,card.label);
  renderAll();updatePanel();
}
function cardClick(pid,idx,type){
  if(G.phase==='replace'&&G.drawnFrom==='number'&&type==='hand')G.selHand=G.selHand===idx?null:idx;
  else if(G.phase==='replace'&&G.drawnFrom==='special'&&type==='special')G.selSpec=G.selSpec===idx?null:idx;
  else if(G.phase==='play_special'&&type==='special')G.selSpec=G.selSpec===idx?null:idx;
  else if(G.phase==='swap_pick_my_card'&&type==='hand'){G.selHand=idx;G.phase='swap_pick_target_card';showSwapModal();return;}
  else if(G.phase==='swap_pick_target_card'&&pid===G.swapTarget&&type==='hand'){G.swapTargetCard=idx;doSwap();return;}
  else if(G.phase==='replace_special'&&type==='hand')G.selHand=G.selHand===idx?null:idx;
  renderAll();updatePanel();
}
function confirmRepNum(){const cp=G.players[G.cur];const old=cp.hand[G.selHand];G.ndDisc.push(old);cp.hand[G.selHand]=G.drawn;log(`replaced ${old.label} with ${G.drawn.label}`,cp.name);G.drawn=null;G.drawnFrom=null;G.selHand=null;G.phase='play_special';checkWin();renderAll();updatePanel();}
function discardDrawn(){if(G.drawnFrom==='number')G.ndDisc.push(G.drawn);else G.sdDisc.push(G.drawn);log(`discarded ${G.drawn.label}`,G.players[G.cur].name);G.drawn=null;G.drawnFrom=null;G.selHand=null;G.selSpec=null;G.phase='play_special';renderAll();updatePanel();}
function addSpecial(){const cp=G.players[G.cur];cp.specials.push(G.drawn);log(`kept special ${G.drawn.label}`,cp.name);G.drawn=null;G.drawnFrom=null;G.phase='play_special';renderAll();updatePanel();}
function confirmRepSpec(){const cp=G.players[G.cur];const old=cp.specials[G.selSpec];G.sdDisc.push(old);cp.specials[G.selSpec]=G.drawn;log(`replaced ${old.label} with ${G.drawn.label}`,cp.name);G.drawn=null;G.drawnFrom=null;G.selSpec=null;G.phase='play_special';renderAll();updatePanel();}
function playSpec(){
  const cp=G.players[G.cur];const card=cp.specials[G.selSpec];
  if(card.type==='swap'){cp.specials.splice(G.selSpec,1);G.sdDisc.push(card);G.selSpec=null;G.phase='swap_pick_my_card';log(`plays SWAP`,cp.name,'SWAP');renderAll();updatePanel();}
  else if(card.type==='replace_all'){cp.specials.splice(G.selSpec,1);G.sdDisc.push(card);G.selSpec=null;G.replLeft=5;G.phase='replace_special';log(`plays REPLACE ALL`,cp.name);renderAll();updatePanel();}
  else{cp.specials.splice(G.selSpec,1);G.sdDisc.push(card);applyVal(cp,card.value);G.selSpec=null;checkWin();G.phase='done';endTurn();}
}
function applyVal(p,d){p.bonus+=d;log(`applied ${d>0?'+':''}${d} to total (now ${hSum(p)})`,p.name);}
function showSwapModal(){
  const ov=document.getElementById('modal-overlay');
  document.getElementById('modal-title').textContent='SWAP — Choose Opponent';
  document.getElementById('modal-body').textContent='Select which player to swap a card with:';
  document.getElementById('modal-cards').innerHTML='';
  const btns=document.getElementById('modal-btns');btns.innerHTML='';
  G.players.filter(p=>p.id!==G.cur).forEach(p=>{
    const b=document.createElement('button');b.className='btn-action';b.textContent=`${p.name} (sum ${hSum(p)})`;
    b.onclick=()=>{G.swapTarget=p.id;ov.classList.remove('open');log(`targeting ${p.name}`,G.players[G.cur].name);renderAll();updatePanel();};
    btns.appendChild(b);
  });
  const c=document.createElement('button');c.className='btn-danger';c.textContent='Cancel';c.onclick=()=>{ov.classList.remove('open');cancelSwap();};btns.appendChild(c);
  ov.classList.add('open');
}
function doSwap(){const cp=G.players[G.cur];const tp=G.players[G.swapTarget];const mc=cp.hand[G.selHand];const tc=tp.hand[G.swapTargetCard];cp.hand[G.selHand]=tc;tp.hand[G.swapTargetCard]=mc;log(`swapped ${mc.label}↔${tc.label} with ${tp.name}`,cp.name);G.selHand=null;G.swapTarget=null;G.swapTargetCard=null;G.phase='done';checkWin();endTurn();}
function cancelSwap(){G.selHand=null;G.swapTarget=null;G.swapTargetCard=null;G.phase='play_special';renderAll();updatePanel();}
function confirmRepAllStep(){const cp=G.players[G.cur];const old=cp.hand[G.selHand];const nc=drawFrom(G.nd,G.ndDisc);if(nc){G.ndDisc.push(old);cp.hand[G.selHand]=nc;log(`replaced ${old.label} with ${nc.label}`,cp.name);}G.replLeft--;G.selHand=null;checkWin();if(G.replLeft<=0){G.phase='done';endTurn();}else{renderAll();updatePanel();}}
 
function endTurn(){
  G.selHand=null;G.selSpec=null;G.drawn=null;G.drawnFrom=null;G.phase='draw';
  G.cur=(G.cur+1)%G.players.length;
  renderAll();updatePanel();
  const cp=G.players[G.cur];
  if(!cp.isHuman&&!G.over)setTimeout(aiTurn,600);
}
 
// ── WIN CHECK ────────────────────────────────────────
function checkWin(){
  const cp=G.players[G.cur];
  if(hSum(cp)===50&&!G.over){
    G.over=true;G.winner=cp;
    log(`🏆 wins with sum 50!`,cp.name,null,true);
    setTimeout(()=>startPenalty(cp),800);
  }
}
 
// ── PENALTY PHASE ────────────────────────────────────
function startPenalty(winner){
  const losers=G.players.filter(p=>p.id!==winner.id).sort((a,b)=>Math.abs(hSum(b)-50)-Math.abs(hSum(a)-50));
  const loser=losers[0];
  loser.lossStreak=(loser.lossStreak||0)+1;
  G.players.forEach(p=>{if(p.id!==loser.id)p.lossStreak=0;});
  const n=Math.min(loser.lossStreak,3);
  loser.activePenalties=[];
 
  setScreen('penalty-screen');
  document.getElementById('penalty-loser-name').textContent=`${loser.avatar} ${loser.name} takes the penalty!`;
  document.getElementById('penalty-diff-text').textContent=`Total: ${hSum(loser)} — ${Math.abs(hSum(loser)-50)} away from 50`;
  const si=document.getElementById('penalty-streak-info');
  if(loser.lossStreak>1){si.style.display='block';si.textContent=`🔥 ${loser.lossStreak}-loss streak! Draw ${n} penalty card${n>1?'s':''}!`;}
  else si.style.display='none';
  document.getElementById('penalty-instructions').textContent=`${loser.name}, flip ${n} card${n>1?'s':''} to reveal your penalt${n>1?'ies':'y'}!`;
 
  // Build 20-card grid — n of them are "real" chosen cards, rest are decoys (still funny though)
  const chosen=shuffle([...PENALTY_CARDS]).slice(0,n);
  const allShuffled=shuffle([...PENALTY_CARDS]);
  const positions=shuffle([...Array(20).keys()]).slice(0,n);
  const grid=document.getElementById('penalty-cards-grid');grid.innerHTML='';
  document.getElementById('penalty-continue-btn').style.display='none';
  let revealed=0;
 
  for(let i=0;i<20;i++){
    const isReal=positions.includes(i);
    const cardData=isReal?chosen[positions.indexOf(i)]:allShuffled[i%allShuffled.length];
    const slot=document.createElement('div');slot.className='penalty-draw-card';slot.textContent='🎭';
    slot.addEventListener('click',function(){
      if(this.classList.contains('revealed')||this.classList.contains('disabled'))return;
      if(revealed>=n)return;
      this.classList.add('revealed');
      this.textContent='';
      const inner=document.createElement('div');inner.className='penalty-card-inner';
      inner.innerHTML=`<div style="font-size:26px;margin-bottom:4px">${cardData.icon}</div><div style="font-size:9px;color:var(--orange);line-height:1.4;text-align:center;padding:0 4px">${cardData.text}</div>`;
      this.appendChild(inner);
      revealed++;
      loser.activePenalties.push(cardData);
      log(`penalty: ${cardData.icon} ${cardData.text}`,loser.name,null,false,true);
      if(revealed>=n){
        document.getElementById('penalty-continue-btn').style.display='inline-block';
        document.querySelectorAll('.penalty-draw-card:not(.revealed)').forEach(c=>c.classList.add('disabled'));
      }
    });
    grid.appendChild(slot);
  }
}
 
function afterPenalty(){showWinScreen(G.winner);}
 
// ── AI TURN ──────────────────────────────────────────
async function aiTurn(){
  if(G.over)return;
  document.getElementById('thinking-bar').style.display='flex';
  document.getElementById('action-panel').style.display='none';
  await sleep(700+Math.random()*600);
  const cp=G.players[G.cur];const s=hSum(cp);const diff=50-s;
  let dt='number';
  if(cp.specials.length<2&&Math.random()<.35)dt='special';
  if(Math.abs(diff)<=5&&cp.specials.length>0)dt='special';
  const card=dt==='number'?drawFrom(G.nd,G.ndDisc):drawFrom(G.sd,G.sdDisc);
  if(!card){aiEnd();return;}
  log(`drew a ${dt} card`,cp.name,card.label);
  if(card.kind==='number'){
    let bi=-1,bs=Math.abs(diff);
    cp.hand.forEach((c,i)=>{const ns=(s-c.value)+card.value;const sc=Math.abs(50-ns);if(sc<bs){bs=sc;bi=i;}});
    if(bi>=0){const old=cp.hand[bi];G.ndDisc.push(old);cp.hand[bi]=card;log(`replaced ${old.label} with ${card.label}`,cp.name);}
    else{G.ndDisc.push(card);log(`discarded ${card.label}`,cp.name);}
  } else {
    if(cp.specials.length<2){cp.specials.push(card);log(`kept ${card.label}`,cp.name);}
    else{const d=cp.specials.splice(0,1)[0];G.sdDisc.push(d);cp.specials.push(card);log(`replaced ${d.label} with ${card.label}`,cp.name);}
  }
  checkWin();if(G.over){document.getElementById('thinking-bar').style.display='none';return;}
  await sleep(500);
  if(cp.specials.length>0){
    const cd=50-hSum(cp);let pi=-1;
    cp.specials.forEach((s2,i)=>{
      if(s2.type==='add'||s2.type==='sub'){const sim=hSum(cp)+s2.value;if(Math.abs(50-sim)<Math.abs(cd))pi=i;}
      else if(s2.type==='replace_all'&&Math.abs(cd)>10)pi=i;
    });
    if(pi>=0){
      const sc=cp.specials[pi];log(`plays ${sc.label}`,cp.name,sc.label);
      if(sc.type==='add'||sc.type==='sub'){cp.specials.splice(pi,1);G.sdDisc.push(sc);applyVal(cp,sc.value);}
      else if(sc.type==='replace_all'){cp.specials.splice(pi,1);G.sdDisc.push(sc);const nh=[];for(let i=0;i<5;i++){const nc=drawFrom(G.nd,G.ndDisc);nh.push(nc||cp.hand[i]);}cp.hand.forEach(c=>G.ndDisc.push(c));cp.hand=nh;log(`new hand [${cp.hand.map(c=>c.label).join(',')}]`,cp.name);}
      else if(sc.type==='swap'){cp.specials.splice(pi,1);G.sdDisc.push(sc);aiSwap(cp);}
      checkWin();
    }
  }
  await sleep(400);
  document.getElementById('thinking-bar').style.display='none';
  if(!G.over)aiEnd();
}
function aiSwap(ai){
  const s=hSum(ai);let bt=null,bmi=-1,bti=-1,bg=0;
  G.players.forEach(p=>{if(p.id===ai.id)return;p.hand.forEach((tc,ti)=>{ai.hand.forEach((mc,mi)=>{const ns=s-mc.value+tc.value;const g=Math.abs(50-s)-Math.abs(50-ns);if(g>bg){bg=g;bt=p;bmi=mi;bti=ti;}});});});
  if(bt&&bg>0){const mc=ai.hand[bmi],tc=bt.hand[bti];ai.hand[bmi]=tc;bt.hand[bti]=mc;log(`swapped ${mc.label}↔${tc.label} with ${bt.name}`,ai.name);}
}
function aiEnd(){G.cur=(G.cur+1)%G.players.length;G.phase='draw';renderAll();updatePanel();const cp=G.players[G.cur];if(!cp.isHuman&&!G.over)setTimeout(aiTurn,600);}
 
// ── WIN SCREEN ───────────────────────────────────────
function showWinScreen(winner){
  setScreen('win-screen');
  document.getElementById('win-player-name').textContent=`${winner.avatar} ${winner.name} wins!`;
  const ce=document.getElementById('win-cards');ce.innerHTML='';
  winner.hand.forEach(c=>ce.appendChild(mkCard(c)));
  const ps=document.getElementById('win-penalties-section');ps.innerHTML='';
  const any=G.players.some(p=>p.activePenalties.length>0);
  if(any){
    ps.innerHTML='<div style="font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:10px">🎭 Active Penalties</div>';
    G.players.filter(p=>p.activePenalties.length>0).forEach(p=>{
      const row=document.createElement('div');row.style.marginBottom='8px';
      row.innerHTML=`<span style="color:var(--text);font-weight:700">${p.avatar} ${p.name}:</span> `;
      p.activePenalties.forEach(pen=>{const t=document.createElement('span');t.style.cssText='margin:2px;padding:3px 10px;border-radius:12px;background:rgba(224,136,48,.15);border:1px solid rgba(224,136,48,.4);color:var(--orange);font-size:11px;display:inline-block';t.textContent=pen.icon+' '+pen.text;row.appendChild(t);});
      ps.appendChild(row);
    });
  }
  spawnConfetti();
}
 
// ── UTILS ────────────────────────────────────────────
function log(action,player,card,isWin,isPenalty){
  const logEl=document.getElementById('log-panel');
  const e=document.createElement('div');e.className='log-entry';
  const cls=isWin?'le-win':isPenalty?'le-penalty':'le-action';
  e.innerHTML=`<span class="le-player">${player}</span> <span class="${cls}">${action}</span>${card?` <span class="le-card">[${card}]</span>`:''}`;
  logEl.appendChild(e);logEl.scrollTop=logEl.scrollHeight;
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function setScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function spawnConfetti(){const cols=['#f0c060','#50c878','#5090e0','#e05050','#9060d0','#fff'];for(let i=0;i<60;i++){const el=document.createElement('div');el.className='confetti-dot';const sz=4+Math.random()*8;el.style.cssText=`width:${sz}px;height:${sz*(.4+Math.random())}px;left:${Math.random()*100}vw;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s;top:0`;document.body.appendChild(el);el.addEventListener('animationend',()=>el.remove());}}
function resetGame(){setScreen('title-screen');selectedCount=null;document.querySelectorAll('.cnt-btn').forEach(b=>b.classList.remove('selected'));document.getElementById('start-btn').disabled=true;document.getElementById('setup-names').innerHTML='';document.querySelectorAll('.confetti-dot').forEach(e=>e.remove());}
function showRules(){
  const ov=document.getElementById('modal-overlay');
  document.getElementById('modal-title').textContent='HOW TO PLAY';
  document.getElementById('modal-body').innerHTML=`<strong style="color:var(--gold)">Goal:</strong> Make your 5 number cards sum exactly <strong style="color:var(--green)">50</strong>.<br><br><strong style="color:var(--blue)">Each turn:</strong><br>1. Draw from Number or Special pile<br>2. Replace a card in your hand<br>3. Optionally play 1 special card<br><br><strong style="color:var(--purple)">Special Cards (23 total):</strong><br>+1/+2/+3/+5 → adds to your total (4 of each)<br>−1/−2/−3/−4/−5 → subtracts (1 of each)<br>SWAP → exchange a card with an opponent (×2)<br><br><strong style="color:var(--orange)">🎭 Penalty System:</strong><br>The player <em>farthest from 50</em> when someone wins flips cards from a secret pile of 20.<br><br>Loss streak → more penalty cards:<br>1 loss = 1 card &nbsp;·&nbsp; 2 streak = 2 cards &nbsp;·&nbsp; 3+ = 3 cards`;
  document.getElementById('modal-cards').innerHTML='';
  const btns=document.getElementById('modal-btns');btns.innerHTML='';
  const c=document.createElement('button');c.className='btn-action';c.textContent='Got it!';c.onclick=()=>ov.classList.remove('open');btns.appendChild(c);
  ov.classList.add('open');
}
</script>
